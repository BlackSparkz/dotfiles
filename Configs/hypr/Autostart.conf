exec-once = kdeconnect-indicator
exec-once = mako
exec-once = kitty
exec-once = wl-paste --type image --watch cliphist store
exec-once = wl-paste --type text --watch cliphist store
exec-once = hyprctl setcursor Bibata-Modern-Ice 24
exec-once = bash $HOME/.config/Scripts/random_wall_on_home.sh
exec-once = waybar -c ~/.config/waybar/Hyprland/config.jsonc -s ~/.config/waybar/style.css
exec-once = swayidle -w timeout 120 'hyprlock' timeout 150 'hyprctl dispatch dpms off' resume 'hyprctl dispatch dpms on' timeout 180 'systemctl suspend' before-sleep 'hyprlock'
