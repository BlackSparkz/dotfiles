exec-once = kdeconnect-indicator
exec-once = mako
exec-once = kitty
exec-once = wl-paste --type image --watch cliphist store
exec-once = wl-paste --type text --watch cliphist store
exec-once = hyprctl setcursor Bibata-Modern-Ice 24
exec-once = swaybg -i ~/Wallpapers/arch-nord-dark.png -m fill & # bash $HOME/.config/Scripts/random_wall_on_home.sh
exec-once = waybar -c ~/.config/waybar/Hyprland/config.jsonc -s ~/.config/waybar/style.css
exec-once = swayidle -w timeout 120 'systemctl suspend' before-sleep 'hyprlock'
